<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotorgram</title>
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>

        <link
            rel="icon"
            type="image/x-icon"
            href="./assets/icons/favicon.png"
        />
    </head>
    <body>
        <header class="header">
            <section class="header-content">
                <img src="./assets/icons/favicon.png" alt="Fotogram Logo" />
                <h2>Fotogram</h2>
            </section>
        </header>
        <main>
            <section class="main-content">
                <h1>Your personal photo album</h1>
                <div class="main-gallery" id="gallery"></div>

                <dialog id="myDialog">
                    <header class="dialog-header" onclick="endDialog()">
                        <h2 id="dialogH2"></h2>
                        <button id="dialogBtn" onclick="endDialog()"></button>
                    </header>

                    <div
                        class="content-dialog"
                        id="dialogContent"
                        onclick="endDialog()"
                    ></div>

                    <footer class="dialog-footer" id="dialogFooter">
                        <div></div>
                    </footer>
                </dialog>
            </section>
        </main>
        <footer class="footer">
            <section class="footer-content">
                <div class="da-logo">
                    <img
                        src="./assets/icons/footer_logo.png"
                        alt="Developer Akademie Logo"
                    />
                </div>
                <a href="impressum.html"
                    ><p>&copy; 2023 Developer Akademie GmbH</p></a
                >
            </section>
        </footer>
    </body>
</html>

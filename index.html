<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotorgram</title>
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>

        <link
            rel="icon"
            type="image/x-icon"
            href="./assets/icons/favicon.png"
        />
    </head>
    <body>
        <header>
            <section class="header-content">
                <img src="./assets/icons/favicon.png" alt="Fotogram Logo" />
                <h2>Fotogram</h2>
            </section>
        </header>
        <main>
            <section class="main-content">
                <h1>Your personal photo album</h1>
                <div id="container"></div>

                <dialog>
                    <header>
                        <h2></h2>
                        <button></button>
                        <p></p>
                    </header>
                </dialog>
            </section>
        </main>
        <footer>
            <section class="footer-content">
                <div class="da-logo">
                    <img src="./assets/icons/da_logo.png" alt="DA Logo" />
                    <h3>
                        Developer <br />
                        Akademie
                    </h3>
                </div>
                <img src="./assets/icons/2023_da.png" alt="Copyright 2023" />
            </section>
        </footer>
    </body>
</html>

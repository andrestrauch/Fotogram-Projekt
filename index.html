<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotorgram</title>
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="data_base.js" defer></script>
        <script src="template.js" defer></script>
        <script src="script.js" defer></script>

        <link
            rel="icon"
            type="image/x-icon"
            href="./assets/icons/favicon.png"
        />
    </head>
    <body onload="renderBoxes(event)">
        <header aria-label="Kopfzeile mit Fotogramlogo" class="header">
            <section class="header-content">
                <img src="./assets/icons/favicon.png" alt="Fotogram Logo" />
                <h2>Fotogram</h2>
            </section>
        </header>
        <main>
            <section aria-labelledby="mainTitle" class="main-content">
                <h1 id="mainTitle">Your personal photo album</h1>
                <div class="main-gallery" id="gallery"></div>

                <dialog id="myDialog" aria-labelledby="dialogTitle">
                    <header class="dialog-header">
                        <h2
                            aria-label="Bild Name"
                            tabindex="-1"
                            id="dialogTitle"
                        ></h2>
                        <button
                            class="closeBtn"
                            aria-label="Dialog schließen"
                            id="dialogBtn"
                            onclick="endDialog(event)"
                        ></button>
                    </header>

                    <section
                        class="content-dialog"
                        id="dialogContent"
                    ></section>

                    <footer class="dialog-footer" id="dialogFooter">
                        <div></div>
                    </footer>
                </dialog>
            </section>
        </main>
        <footer class="footer">
            <section class="footer-content">
                <div class="da-logo">
                    <img
                        src="./assets/icons/footer_logo.png"
                        alt="Developer Akademie Logo"
                    />
                </div>
                <a href="impressum.html" target="_blank"
                    ><p>&copy; 2023 Developer Akademie GmbH</p>
                </a>
            </section>
        </footer>
    </body>
</html>
